name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Format
        run: pnpm check

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test:ci

      - name: Check for changeset
        run: |
          # Check if there are changes to package source files
          if git diff --name-only origin/main...HEAD | grep -E "(packages/.*/src/|packages/.*/package\.json)" > /dev/null; then
            echo "Source code changes detected, checking for changeset..."
            
            # Check if there are changesets
            if [ -z "$(find .changeset -name '*.md' -not -name 'README.md' 2>/dev/null)" ]; then
              echo "❌ Changes to package source files require a changeset."
              echo "Run 'pnpm changeset' to create one."
              echo ""
              echo "Changed files:"
              git diff --name-only origin/main...HEAD | grep -E "(packages/.*/src/|packages/.*/package\.json)" || true
              exit 1
            else
              echo "✅ Changeset found for source changes."
            fi
          else
            echo "✅ No source code changes detected, changeset not required."
          fi
          
          # Always run changeset status for additional validation
          pnpm changeset status --since=origin/main